services:
  postgres:
    image: postgres:16-alpine
    container_name: poleras_postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  admin:
    build: ./backend/admin
    container_name: poleras_admin
    ports:
      - "8000:8000"
    volumes:
      - ./backend/admin:/app
      - media_files:/app/media
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  media_files:
