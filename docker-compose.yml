services:
  postgres:
    image: postgres:16-alpine
    container_name: poleras_postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  admin:
    build: ./backend/admin
    container_name: poleras_admin
    ports:
      - "8000:8000"
    volumes:
      - ./backend/admin:/app
      - media_files:/app/media
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy

  app:
      build: ./backend/app
      container_name: poleras_app
      restart: unless-stopped
      env_file: .env
      ports:
        - "8001:8001"
      volumes:
        - ./backend/app:/app
      depends_on:
        postgres:
          condition: service_healthy
        elasticsearch:
          condition: service_started

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: poleras_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    mem_limit: 512m

volumes:
  postgres_data:
  media_files:
  elasticsearch_data:

